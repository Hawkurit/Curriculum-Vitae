            skill_vm_name: "Sýndarvélar",
            skill_vm_desc: "Sérstaklega HyperV og undirkerfi í Windows.",
            skill_git_name: "Git",
            skill_git_desc:
              "Git í skipanalínu, GitHub í vafra og GitHub Desktop.",
            skill_vscode_name: "Virtual Studio Code",
            skill_vscode_desc:
              "Mitt helsta þróunarumhverfi. Þekki einnig Nano og Vim og get dýpkað þá kunnáttu ef þörf er á.",
            skill_aws_name: "Amazon Web Services",
            skill_aws_desc:
              "Setja upp og fylgjast með forritum með helstu AWS-þjónustum (EC2, S3, RDS, IAM).",
            skill_office_name: "Microsoft Office",
            skill_office_desc: "Word, Excel, PowerPoint.",
            skill_adobe_name: "Adobe forrit",
            skill_adobe_desc:
              "Mikil reynsla af Photoshop, Illustrator og InDesign.",
            skill_agile_name: "Agile aðferðir",
            skill_agile_desc:
              "Flest stærri teymisverkefni sem ég hef unnið í voru unnin eftir Agile aðferðum, þá aðallega Scrum.",
            lang_is_name: "Íslenska",
            lang_is_level: "Móðurmál",
            lang_en_name: "Enska",
            lang_en_level: "Reiprennandi",
            lang_da_name: "Danska",
            lang_da_level: "Grunnþekking",
            lang_de_name: "Þýska",
            lang_de_level: "Grunnþekking",
            lang_es_name: "Spænska",
            lang_es_level: "Byrjandi",
            interests_text:
              "Tónlist, forritun og annað nördalegt. Ég spilaði körfubolta og mikið Dungeons and Dragons á unglingsárunum. Ég geri oft myndlist þegar tími gefst og spila á mörg hljóðfæri.",
          },
        };

        const button = document.getElementById("lang-toggle");
        if (!button) return;

        const downloadBtn = document.getElementById("download-pdf");

        let current =
          localStorage.getItem("lang") || document.documentElement.lang || "en";

        function applyLang(lang) {
          current = lang;
          button.textContent = lang === "en" ? "🇮🇸 IS" : "🇬🇧 EN";
          document.documentElement.lang = lang === "en" ? "en" : "is";

          const dict = translations[lang] || {};
          document.querySelectorAll("[data-i18n]").forEach((el) => {
            const key = el.getAttribute("data-i18n");
            if (Object.prototype.hasOwnProperty.call(dict, key)) {
              el.textContent = dict[key];
            }
          });

          localStorage.setItem("lang", lang);
        }

        button.addEventListener("click", function () {
          applyLang(current === "en" ? "is" : "en");
        });

        if (downloadBtn) {
          downloadBtn.addEventListener("click", function () {
            window.print();
          });
        }

        applyLang(current === "is" ? "is" : "en");
      })();
    </script>
